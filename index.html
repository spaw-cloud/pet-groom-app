<!DOCTYPE html>
<html lang="en" style="height: 100%">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
    <title>Spaw Group - Pet Grooming</title>

    <!-- PWA Meta Tags -->
    <meta name="application-name" content="Spaw Group" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Spaw Group" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="apple-touch-icon" sizes="152x152" href="/apple-touch-icon-152x152.png" />
    <link rel="apple-touch-icon" sizes="167x167" href="/apple-touch-icon-167x167.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="theme-color" content="#8B5CF6" />
    <meta name="description" content="Professional doorstep pet grooming services. Book services, manage pets, and schedule grooming appointments." />

    <!-- App Icons -->
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/icon-512.png" />

    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous" />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        margin: 0;
        height: 100%;
        overflow: auto;
        display: flex;
        flex-direction: column;
        background-color: #0f172a;
        font-family: 'Outfit', sans-serif;
        -webkit-font-smoothing: antialiased;
      }
      #root {
        display: flex;
        flex-direction: column;
        min-height: 100%;
        flex: 1;
      }
      input, textarea, select {
        -webkit-user-select: text !important;
        user-select: text !important;
        pointer-events: auto !important;
        cursor: text !important;
        -webkit-appearance: none !important;
        touch-action: manipulation !important;
        font-family: 'Outfit', sans-serif;
      }
      input::placeholder, textarea::placeholder {
        color: #64748b !important;
        opacity: 1 !important;
        font-family: 'Outfit', sans-serif !important;
      }
      input:focus, textarea:focus { outline: none !important; }
      button { cursor: pointer; font-family: 'Outfit', sans-serif; }
      a { text-decoration: none; color: inherit; }
      ::-webkit-scrollbar { width: 0; height: 0; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', function() {
          navigator.serviceWorker.register('/service-worker.js').catch(function() {});
        });
      }
    </script>
  </body>
</html>
